<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOCHINOSE SKATE TRIP 🛹 鳥取遠征</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --accent: #ff4d1c;
    --accent2: #ffd700;
    --text: #f0f0f0;
    --muted: #666;
    --green: #00e676;
    --blue: #2979ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, #0a0a0f 0%, #1a0a00 100%);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 20px rgba(255,77,28,0.5); }
  .logo span { color: var(--accent2); }
  .date-badge { background: var(--accent); color: white; font-weight: 900; font-size: 12px; padding: 4px 10px; letter-spacing: 1px; }

.app {
display: grid;
grid-template-columns: 1fr 390px;
grid-template-rows: auto 1fr;
height: calc(100vh - 58px);
}
.map-area { grid-row: 1 / 3; background: #080d14; overflow: hidden; }
#routeMap { width: 100%; height: 100%; }

/* ETA */
.eta-panel { background: var(–surface); border-bottom: 1px solid #222; padding: 14px 18px; }
.eta-title { font-family: ‘Bebas Neue’, cursive; font-size: 12px; letter-spacing: 2px; color: var(–muted); margin-bottom: 8px; }
.eta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 10px; }
.eta-item { background: var(–surface2); padding: 8px 9px; border-left: 3px solid var(–accent); }
.eta-item.gold { border-color: var(–accent2); }
.eta-item.blue { border-color: var(–blue); }
.eta-item.green { border-color: var(–green); }
.eta-spot { font-size: 9px; color: var(–muted); margin-bottom: 1px; }
.eta-time { font-family: ‘Bebas Neue’, cursive; font-size: 20px; letter-spacing: 1px; }
.eta-label { font-size: 9px; color: var(–muted); }
.controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.ctrl-group label { font-size: 10px; color: var(–muted); display: block; margin-bottom: 3px; }
.ctrl-row { display: flex; align-items: center; gap: 6px; }
.ctrl-row input[type=range] { width: 90px; }
.ctrl-val { font-family: ‘Bebas Neue’, cursive; font-size: 14px; color: var(–text); min-width: 28px; }
.dep-ctrl { display: flex; align-items: center; border: 1px solid #333; }
.dep-btn { background: var(–surface2); border: none; color: var(–text); width: 28px; height: 28px; cursor: pointer; font-size: 15px; transition: background .15s; }
.dep-btn:hover { background: var(–accent); }
.dep-display { font-family: ‘Bebas Neue’, cursive; font-size: 17px; padding: 0 10px; color: var(–accent); background: var(–bg); border-left: 1px solid #333; border-right: 1px solid #333; line-height: 28px; }

/* CHAT */
.chat-area { background: var(–surface); display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 10px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
.chat-header-title { font-family: ‘Bebas Neue’, cursive; font-size: 17px; letter-spacing: 2px; }
.online-count { background: var(–green); color: #000; font-size: 10px; font-weight: 900; padding: 2px 7px; border-radius: 10px; margin-left: auto; }
.messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 9px; scrollbar-width: thin; scrollbar-color: var(–accent) transparent; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(–accent); }
.msg { display: flex; gap: 8px; animation: msgIn .3s ease; }
.msg.me { flex-direction: row-reverse; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.avatar { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; border: 2px solid var(–accent); background: var(–surface2); clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
.msg-content { max-width: 200px; }
.msg-name { font-size: 10px; color: var(–muted); margin-bottom: 2px; font-weight: 700; letter-spacing: 1px; }
.msg.me .msg-name { text-align: right; }
.bubble { background: var(–surface2); padding: 8px 11px; font-size: 12px; line-height: 1.5; border: 1px solid #2a2a3a; }
.msg.me .bubble { background: rgba(255,77,28,.13); border-color: rgba(255,77,28,.3); }
.msg-time { font-size: 10px; color: var(–muted); margin-top: 2px; }
.msg.me .msg-time { text-align: right; }

/* VOTE */
.vote-section { padding: 10px 14px; border-top: 1px solid #222; background: var(–bg); }
.vote-section-title { font-family: ‘Bebas Neue’, cursive; font-size: 12px; letter-spacing: 2px; color: var(–muted); margin-bottom: 7px; }
.spot-card { background: var(–surface2); border: 1px solid #2a2a3a; padding: 8px 11px; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; margin-bottom: 5px; transition: border-color .2s; }
.spot-card:last-child { margin-bottom: 0; }
.spot-card:hover { border-color: var(–accent); }
.spot-card-name { font-size: 13px; font-weight: 700; }
.spot-card-detail { font-size: 10px; color: var(–muted); margin-top: 1px; }
.vote-btns { display: flex; gap: 3px; }
.vote-btn { width: 29px; height: 29px; border: 1px solid #333; background: transparent; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.vote-btn:hover { background: #2a2a3a; transform: scale(1.1); }
.vote-btn.active-yes { background: rgba(0,230,118,.2); border-color: var(–green); }
.vote-btn.active-maybe { background: rgba(255,215,0,.2); border-color: var(–accent2); }
.vote-btn.active-no { background: rgba(255,77,28,.2); border-color: var(–accent); }
.vote-count { font-size: 10px; color: var(–muted); margin-top: 3px; display: flex; gap: 6px; }
.vote-yes{color:var(–green)} .vote-maybe{color:var(–accent2)} .vote-no{color:var(–accent)}

/* INPUT */
.input-area { padding: 9px 13px; border-top: 1px solid #222; background: var(–surface); display: flex; gap: 6px; align-items: flex-end; }
.name-select { background: var(–surface2); border: 1px solid #333; color: var(–text); padding: 5px 6px; font-size: 11px; font-family: inherit; width: 80px; flex-shrink: 0; }
.msg-input { flex: 1; background: var(–surface2); border: 1px solid #333; color: var(–text); padding: 7px 10px; font-size: 12px; font-family: inherit; resize: none; height: 34px; line-height: 1.4; }
.msg-input:focus,.name-select:focus { outline: none; border-color: var(–accent); }
.send-btn { background: var(–accent); border: none; color: white; width: 34px; height: 34px; cursor: pointer; font-size: 14px; transition: all .15s; flex-shrink: 0; clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
.send-btn:hover { background: #ff6a3d; }
.grain { position: fixed; inset: 0; pointer-events: none; opacity: .03; z-index: 1000; background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”); background-size:150px; }

@media(max-width:800px){
.app{grid-template-columns:1fr;grid-template-rows:260px auto 1fr;height:auto;}
.map-area{grid-row:1;height:260px;}
.eta-grid{grid-template-columns:1fr 1fr;}
}
</style>

</head>

<script>
// 名古屋→日岡山: 約150km 高速＋一般道込み約2時間
// 日岡山→鳥取: 約100km 約1h40m
// ※所要時間は高速IC降りてからの一般道含む
const NAGOYA_HIOKA = 2.0;
const HIOKA_TOTTORI = 1 + 40/60;
let depMin = 8 * 60;

function fmt(m) {
  const h = Math.floor(m / 60) % 24, mm = m % 60;
  return `${h.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
}
function changeDep(d) {
  depMin = Math.max(5*60, Math.min(13*60, depMin + d));
  document.getElementById('depDisplay').textContent = fmt(depMin);
  updateETA();
}
function updateETA() {
  const skH = parseFloat(document.getElementById('skateTime').value);
  const stH = parseFloat(document.getElementById('stopTime').value);
  document.getElementById('skateVal').textContent = skH + 'h';
  document.getElementById('stopVal').textContent = stH + 'h';
  document.getElementById('skate-dur').textContent = skH;
  document.getElementById('stop-dur').textContent = stH;
  document.getElementById('t-dep').textContent = fmt(depMin);

  const skArr = depMin + NAGOYA_HIOKA * 60;
  const skDep = skArr + skH * 60;
  const stArr = skDep + (stH > 0 ? 30 : 0);
  const totArr = skDep + stH * 60 + HIOKA_TOTTORI * 60;

  document.getElementById('t-skate-arr').textContent = fmt(skArr);
  document.getElementById('t-stop-arr').textContent = stH > 0 ? fmt(stArr) : '—';
  const el = document.getElementById('t-arrive');
  el.textContent = fmt(totArr);
  el.style.color = totArr/60 > 20 ? '#ff4d1c' : totArr/60 > 18 ? '#ffd700' : '#00e676';
}

// SPOTS
const spots = [
  { id:'himeji', name:'姫路城 🏯', detail:'世界遺産 / 日岡山から西10km・約20分', votes:{yes:[],maybe:[],no:[]} },
];
const myVotes = {};
const emojis = {タロ:'🛹',ケン:'🔥',ユウ:'⚡',コウ:'💀',リョウ:'🤙',ヒロ:'🎯',マコ:'🌊'};

function renderSpots() {
  document.getElementById('spotCards').innerHTML = spots.map(s => {
    const mv = myVotes[s.id];
    return `<div class="spot-card">
      <div>
        <div class="spot-card-name">${s.name}</div>
        <div class="spot-card-detail">${s.detail}</div>
        <div class="vote-count">
          <span class="vote-yes">✅ ${s.votes.yes.length}</span>
          <span class="vote-maybe">🤷 ${s.votes.maybe.length}</span>
          <span class="vote-no">❌ ${s.votes.no.length}</span>
        </div>
      </div>
      <div class="vote-btns">
        <button class="vote-btn ${mv==='yes'?'active-yes':''}" onclick="vote('${s.id}','yes')">✅</button>
        <button class="vote-btn ${mv==='maybe'?'active-maybe':''}" onclick="vote('${s.id}','maybe')">🤷</button>
        <button class="vote-btn ${mv==='no'?'active-no':''}" onclick="vote('${s.id}','no')">❌</button>
      </div>
    </div>`;
  }).join('');
}

function vote(id, type) {
  const name = document.getElementById('myName').value;
  if (!name) { alert('名前を選んでね！'); return; }
  const s = spots.find(x => x.id === id);
  ['yes','maybe','no'].forEach(t => s.votes[t] = s.votes[t].filter(n => n !== name));
  if (myVotes[id] === type) { delete myVotes[id]; }
  else {
    s.votes[type].push(name);
    myVotes[id] = type;
    addMsg(name, `【${s.name}】${{yes:'行きたい！🙋',maybe:'どっちでも〜',no:'パスかな👋'}[type]}`, true);
  }
  renderSpots();
}

function nowTime() { const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

function addMsg(name, text, isMe, time) {
  const c = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${isMe ? 'me' : ''}`;
  d.innerHTML = `<div class="avatar">${emojis[name]||'👤'}</div>
    <div class="msg-content">
      <div class="msg-name">${name}</div>
      <div class="bubble">${text}</div>
      <div class="msg-time">${time||nowTime()}</div>
    </div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function sendMsg() {
  const name = document.getElementById('myName').value;
  const text = document.getElementById('msgInput').value.trim();
  if (!name) { alert('名前を選んでください！'); return; }
  if (!text) return;
  addMsg(name, text, true);
  document.getElementById('msgInput').value = '';
}

[
  {n:'タロ', t:'三木スケートパーク！コンクリートやからガチで滑れそう🔥', time:'07:10'},
  {n:'ユウ', t:'天橋立って鳥取ルートやん！股のぞきしたい笑', time:'07:18'},
  {n:'コウ', t:'姫路城は外だけでもテンション上がるよな〜', time:'07:31'},
  {n:'ケン', t:'三木で2時間は欲しい。スライド練習したい', time:'07:44'},
  {n:'リョウ', t:'夜は温泉宿でビールやろ〜🤙楽しみすぎ', time:'07:52'},
].forEach(m => addMsg(m.n, m.t, false, m.time));

renderSpots();
updateETA();

// Simulate initial votes
setTimeout(() => {
  [{s:'himeji',t:'yes',n:'ユウ'},{s:'himeji',t:'yes',n:'リョウ'},{s:'himeji',t:'maybe',n:'ケン'},{s:'himeji',t:'yes',n:'ヒロ'},{s:'himeji',t:'no',n:'マコ'}]
  .forEach((v,i) => setTimeout(() => {
    const sp = spots.find(x => x.id === v.s);
    if (!sp.votes[v.t].includes(v.n)) sp.votes[v.t].push(v.n);
    renderSpots();
  }, i * 600), 0);
}, 1500);

setTimeout(() => addMsg('ユウ', '姫路城寄ってこうよ！外から見るだけでもテンション上がるやん', false), 2500);
setTimeout(() => addMsg('マコ', '渋滞気になるな〜時間次第やな', false), 4800);
</script>
