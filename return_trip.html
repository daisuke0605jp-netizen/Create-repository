<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOCHINOSE SKATE TRIP 🛹 帰り道 鳥取→名古屋</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0a;
    --surface: #131a13;
    --surface2: #1c271c;
    --accent: #00e676;
    --accent2: #ffd700;
    --text: #f0f0f0;
    --muted: #666;
    --red: #ff4d1c;
    --blue: #2979ff;
    --purple: #aa00ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: linear-gradient(135deg, #0a0f0a 0%, #001a0a 100%);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 26px; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 20px rgba(0,230,118,0.5); }
  .logo span { color: var(--accent2); }
  .date-badge { background: var(--accent); color: #000; font-weight: 900; font-size: 12px; padding: 4px 10px; letter-spacing: 1px; }

  .app {
    display: grid;
    grid-template-columns: 1fr 390px;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 58px);
  }
  .map-area { grid-row: 1 / 3; background: #080d08; overflow: hidden; }
  #routeMap { width: 100%; height: 100%; }

  /* ETA */
  .eta-panel { background: var(--surface); border-bottom: 1px solid #222; padding: 14px 18px; }
  .eta-title { font-family: 'Bebas Neue', cursive; font-size: 12px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
  .eta-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-bottom: 10px; }
  .eta-item { background: var(--surface2); padding: 8px 9px; border-left: 3px solid var(--accent); }
  .eta-item.gold { border-color: var(--accent2); }
  .eta-item.blue { border-color: var(--blue); }
  .eta-item.purple { border-color: var(--purple); }
  .eta-item.red { border-color: var(--red); }
  .eta-spot { font-size: 9px; color: var(--muted); margin-bottom: 1px; }
  .eta-time { font-family: 'Bebas Neue', cursive; font-size: 18px; letter-spacing: 1px; }
  .eta-label { font-size: 9px; color: var(--muted); }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .ctrl-group label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 3px; }
  .ctrl-row { display: flex; align-items: center; gap: 6px; }
  .ctrl-row input[type=range] { width: 90px; }
  .ctrl-val { font-family: 'Bebas Neue', cursive; font-size: 14px; color: var(--text); min-width: 28px; }
  .dep-ctrl { display: flex; align-items: center; border: 1px solid #333; }
  .dep-btn { background: var(--surface2); border: none; color: var(--text); width: 28px; height: 28px; cursor: pointer; font-size: 15px; transition: background .15s; }
  .dep-btn:hover { background: var(--accent); color: #000; }
  .dep-display { font-family: 'Bebas Neue', cursive; font-size: 17px; padding: 0 10px; color: var(--accent); background: var(--bg); border-left: 1px solid #333; border-right: 1px solid #333; line-height: 28px; }

  /* CHAT */
  .chat-area { background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
  .chat-header { padding: 10px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
  .chat-header-title { font-family: 'Bebas Neue', cursive; font-size: 17px; letter-spacing: 2px; }
  .online-count { background: var(--accent); color: #000; font-size: 10px; font-weight: 900; padding: 2px 7px; border-radius: 10px; margin-left: auto; }
  .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 9px; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--accent); }
  .msg { display: flex; gap: 8px; animation: msgIn .3s ease; }
  .msg.me { flex-direction: row-reverse; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .avatar { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; border: 2px solid var(--accent); background: var(--surface2); clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); }
  .msg-content { max-width: 200px; }
  .msg-name { font-size: 10px; color: var(--muted); margin-bottom: 2px; font-weight: 700; letter-spacing: 1px; }
  .msg.me .msg-name { text-align: right; }
  .bubble { background: var(--surface2); padding: 8px 11px; font-size: 12px; line-height: 1.5; border: 1px solid #2a3a2a; }
  .msg.me .bubble { background: rgba(0,230,118,.1); border-color: rgba(0,230,118,.3); }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .msg.me .msg-time { text-align: right; }

  /* INPUT */
  .input-area { padding: 9px 13px; border-top: 1px solid #222; background: var(--surface); display: flex; gap: 6px; align-items: flex-end; }
  .name-select { background: var(--surface2); border: 1px solid #333; color: var(--text); padding: 5px 6px; font-size: 11px; font-family: inherit; width: 80px; flex-shrink: 0; }
  .msg-input { flex: 1; background: var(--surface2); border: 1px solid #333; color: var(--text); padding: 7px 10px; font-size: 12px; font-family: inherit; resize: none; height: 34px; line-height: 1.4; }
  .msg-input:focus,.name-select:focus { outline: none; border-color: var(--accent); }
  .send-btn { background: var(--accent); border: none; color: #000; width: 34px; height: 34px; cursor: pointer; font-size: 14px; transition: all .15s; flex-shrink: 0; clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%); font-weight: 900; }
  .send-btn:hover { background: #00ff87; }
  .grain { position: fixed; inset: 0; pointer-events: none; opacity: .03; z-index: 1000; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:150px; }

  @media(max-width:800px){
    .app{grid-template-columns:1fr;grid-template-rows:260px auto 1fr;height:auto;}
    .map-area{grid-row:1;height:260px;}
    .eta-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="grain"></div>
<header>
  <div class="logo">KOCHINOSE <span>SKATE</span> TRIP <span style="font-size:18px;color:var(--muted)">// 帰り道</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:11px;color:var(--muted);letter-spacing:1px;">鳥取 → 名古屋（最短ルート）</span>
    <div class="date-badge">4/30 帰還 最短</div>
  </div>
</header>

<div class="app">
  <div class="map-area">
    <!--
      最短ルート: 鳥取→鳥取道→佐用JCT→中国道→吹田JCT→名神→名古屋
      座標変換:
      経度範囲: 133.8〜137.2 → x: 0〜800  (x = (lon-133.8)/3.4*800)
      緯度範囲: 34.4〜35.8  → y: 0〜580  (y = (35.8-lat)/1.4*580)

      鳥取市     134.24, 35.50 → x=103, y=124
      鳥取砂丘   134.23, 35.54 → x=101, y=107
      エネトピア  134.24, 35.49 → x=103, y=131
      佐用JCT    134.38, 35.00 → x=136, y=332
      赤穂付近   134.38, 34.75 → x=136, y=435（中国道）
      吹田JCT    135.51, 34.77 → x=401, y=427
      名神彦根   136.25, 35.27 → x=575, y=244
      名古屋     136.91, 35.18 → x=730, y=279
    -->
    <svg id="routeMap" viewBox="0 0 800 580" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow2"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="bg" cx="30%" cy="30%"><stop offset="0%" stop-color="#091509"/><stop offset="100%" stop-color="#030803"/></radialGradient>
      </defs>

      <rect width="800" height="580" fill="url(#bg)"/>

      <!-- Grid -->
      <g stroke="#fff" stroke-opacity=".018" stroke-width="1">
        <line x1="0" y1="145" x2="800" y2="145"/><line x1="0" y1="290" x2="800" y2="290"/>
        <line x1="0" y1="435" x2="800" y2="435"/>
        <line x1="200" y1="0" x2="200" y2="580"/><line x1="400" y1="0" x2="400" y2="580"/>
        <line x1="600" y1="0" x2="600" y2="580"/>
      </g>

      <!-- 日本海 coast hint -->
      <path d="M0,110 Q50,100 101,107 Q150,112 200,120 Q260,115 320,118"
            fill="none" stroke="#1a3a5c" stroke-width="1.5" stroke-opacity=".5"/>

      <!-- 瀬戸内海 hint -->
      <path d="M100,470 Q200,490 300,485 Q400,480 500,470 Q600,460 700,455"
            fill="none" stroke="#1a3a5c" stroke-width="1" stroke-opacity=".3"/>

      <!-- 琵琶湖 hint -->
      <ellipse cx="590" cy="300" rx="18" ry="45" fill="none" stroke="#1a3a5c" stroke-width="1" stroke-opacity=".4"/>
      <text x="610" y="305" font-size="8" fill="#1a4a7a" font-family="Bebas Neue" opacity=".6">琵琶湖</text>

      <!-- 地名ラベル -->
      <text x="30" y="80" font-size="10" fill="#1a4a7a" font-family="Bebas Neue" letter-spacing="2" opacity=".7">日 本 海</text>
      <text x="60" y="240" font-size="9" fill="#263040" font-family="Noto Sans JP" opacity=".8">鳥取県</text>
      <text x="180" y="380" font-size="9" fill="#263040" font-family="Noto Sans JP" opacity=".8">兵庫県</text>
      <text x="380" y="360" font-size="9" fill="#263040" font-family="Noto Sans JP" opacity=".8">大阪府</text>
      <text x="480" y="280" font-size="9" fill="#263040" font-family="Noto Sans JP" opacity=".8">滋賀県</text>
      <text x="650" y="240" font-size="9" fill="#263040" font-family="Noto Sans JP" opacity=".8">愛知県</text>
      <text x="200" y="480" font-size="9" fill="#1a4a7a" font-family="Bebas Neue" letter-spacing="1" opacity=".5">瀬 戸 内 海</text>

      <!-- 高速道路ラベル -->
      <text x="112" y="230" font-size="7" fill="#2a5a2a" font-family="Bebas Neue" transform="rotate(80,112,230)">鳥取道</text>
      <text x="200" y="415" font-size="7" fill="#2a5a2a" font-family="Bebas Neue" transform="rotate(5,200,415)">中国道</text>
      <text x="490" y="340" font-size="7" fill="#2a5a2a" font-family="Bebas Neue" transform="rotate(-20,490,340)">名神</text>

      <!-- Route glow -->
      <path d="M103,131 Q103,120 101,107" fill="none" stroke="rgba(255,215,0,.2)" stroke-width="12" stroke-linecap="round"/>
      <path d="M101,107 Q102,200 103,220 Q106,280 136,332 Q136,380 200,420 Q280,445 401,427 Q480,390 575,244 Q640,260 730,279"
            fill="none" stroke="rgba(0,230,118,.12)" stroke-width="16" stroke-linecap="round"/>

      <!-- Route: エネトピア → 砂丘 -->
      <path d="M103,131 Q103,120 101,107" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4">
        <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1s" repeatCount="indefinite"/>
      </path>

      <!-- Route: 砂丘 → 鳥取道 → 佐用JCT（南下） -->
      <path d="M101,107 Q102,200 103,220 Q105,275 136,332"
            fill="none" stroke="#00e676" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="9 5">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.1s" repeatCount="indefinite"/>
      </path>

      <!-- Route: 佐用JCT → 中国道 → 吹田JCT（東進） -->
      <path d="M136,332 Q200,420 280,445 Q340,445 401,427"
            fill="none" stroke="#00e676" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="9 5">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.1s" repeatCount="indefinite"/>
      </path>

      <!-- Route: 吹田JCT → 名神 → 名古屋（東進） -->
      <path d="M401,427 Q480,390 575,244 Q640,260 730,279"
            fill="none" stroke="#00e676" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="9 5">
        <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.1s" repeatCount="indefinite"/>
      </path>

      <!-- 距離ラベル -->
      <text x="115" y="225" font-size="7" fill="#3a4a3a" font-family="Bebas Neue" transform="rotate(80,115,225)">〜62km/54分</text>
      <text x="220" y="410" font-size="7" fill="#3a4a3a" font-family="Bebas Neue">中国道 〜117km</text>
      <text x="480" y="355" font-size="7" fill="#3a4a3a" font-family="Bebas Neue" transform="rotate(-20,480,355)">名神 〜130km</text>

      <!-- ======= PINS ======= -->

      <!-- エネトピアアリーナ（スタート） -->
      <g transform="translate(103,131)" filter="url(#glow2)">
        <circle r="18" fill="rgba(0,230,118,.08)" stroke="#00e676" stroke-width=".5">
          <animate attributeName="r" values="18;26;18" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;.25;1" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle r="7" fill="#00e676"/>
        <text x="12" y="-14" font-size="12" fill="#00e676" font-family="Bebas Neue" letter-spacing="1">エネトピア</text>
        <text x="12" y="-2" font-size="9" fill="#888">🛹 スタート</text>
      </g>

      <!-- 鳥取砂丘 -->
      <g transform="translate(101,107)" filter="url(#glow)">
        <circle r="12" fill="rgba(255,215,0,.12)" stroke="#ffd700" stroke-width="1.5"/>
        <polygon points="0,-8 2.5,-2.5 8,-2.5 3.5,1.5 5.5,8 0,4.5 -5.5,8 -3.5,1.5 -8,-2.5 -2.5,-2.5" fill="#ffd700"/>
        <text x="-70" y="-12" font-size="12" fill="#ffd700" font-family="Bebas Neue" letter-spacing="1">鳥取砂丘</text>
        <text x="-70" y="-1" font-size="9" fill="#aaa">🏜 寄り道</text>
      </g>

      <!-- 佐用JCT -->
      <g transform="translate(136,332)">
        <circle r="5" fill="#1a3a1a" stroke="#2a6a2a" stroke-width="1.5"/>
        <circle r="2" fill="#00e676" opacity=".7"/>
        <text x="10" y="4" font-size="8" fill="#446644" font-family="Bebas Neue">佐用JCT</text>
      </g>

      <!-- 吹田JCT -->
      <g transform="translate(401,427)">
        <circle r="5" fill="#1a3a1a" stroke="#2a6a2a" stroke-width="1.5"/>
        <circle r="2" fill="#00e676" opacity=".7"/>
        <text x="8" y="-8" font-size="8" fill="#446644" font-family="Bebas Neue">吹田JCT</text>
      </g>

      <!-- 名古屋（ゴール） -->
      <g transform="translate(730,279)" filter="url(#glow2)">
        <circle r="16" fill="rgba(255,77,28,.08)" stroke="#ff4d1c" stroke-width="1.5">
          <animate attributeName="r" values="16;24;16" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;.25;1" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle r="7" fill="#ff4d1c"/>
        <text x="-55" y="-20" font-size="13" fill="#ff4d1c" font-family="Bebas Neue" letter-spacing="1">名古屋</text>
        <text x="-55" y="-8" font-size="9" fill="#888">🏠 ただいま！</text>
      </g>

      <!-- コンパス -->
      <g transform="translate(755,52)">
        <circle r="18" fill="rgba(255,255,255,.02)" stroke="#2a3a2a" stroke-width="1"/>
        <text x="0" y="-21" font-size="9" fill="#444" text-anchor="middle" font-family="Bebas Neue">N</text>
        <line x1="0" y1="-13" x2="0" y2="13" stroke="#333" stroke-width="1"/>
        <line x1="-13" y1="0" x2="13" y2="0" stroke="#333" stroke-width="1"/>
        <polygon points="0,-11 2.5,0 0,11 -2.5,0" fill="#00e676" opacity=".75"/>
      </g>

      <!-- Legend -->
      <g transform="translate(16,540)">
        <circle cx="6" cy="5" r="4" fill="#00e676"/>
        <text x="14" y="9" font-size="9" fill="#555">出発/到着</text>
        <polygon points="56,5 58,10 63,10 59,13 61,18 56,15 51,18 53,13 49,10 54,10" fill="#ffd700" transform="scale(.75) translate(16,-1)"/>
        <text x="66" y="9" font-size="9" fill="#555">寄り道</text>
        <circle cx="118" cy="5" r="4" fill="#1a3a1a" stroke="#2a6a2a" stroke-width="1.5"/>
        <text x="127" y="9" font-size="9" fill="#555">JCT経由地</text>
      </g>
    </svg>
  </div>

  <!-- ETA PANEL -->
  <div class="eta-panel">
    <div class="eta-title">⏱ タイムライン（推定）— 鳥取道→中国道→名神 最短ルート</div>
    <div class="eta-grid">
      <div class="eta-item">
        <div class="eta-spot">エネトピア</div>
        <div class="eta-time" id="t-dep" style="color:var(--accent)">09:00</div>
        <div class="eta-label">出発</div>
      </div>
      <div class="eta-item gold">
        <div class="eta-spot">鳥取砂丘</div>
        <div class="eta-time" id="t-dune-arr">09:10</div>
        <div class="eta-label">着 / <span id="dune-dur">0.5</span>h</div>
      </div>
      <div class="eta-item blue">
        <div class="eta-spot">佐用JCT</div>
        <div class="eta-time" id="t-mid">—</div>
        <div class="eta-label">通過目安</div>
      </div>
      <div class="eta-item purple">
        <div class="eta-spot">吹田JCT</div>
        <div class="eta-time" id="t-tsuruga">—</div>
        <div class="eta-label">通過目安</div>
      </div>
      <div class="eta-item red">
        <div class="eta-spot">名古屋</div>
        <div class="eta-time" id="t-arrive">14:30</div>
        <div class="eta-label">予定到着</div>
      </div>
    </div>
    <div class="controls">
      <div class="ctrl-group">
        <label>🕐 出発時間</label>
        <div class="dep-ctrl">
          <button class="dep-btn" onclick="changeDep(-30)">－</button>
          <div class="dep-display" id="depDisplay">09:00</div>
          <button class="dep-btn" onclick="changeDep(30)">＋</button>
        </div>
      </div>
      <div class="ctrl-group">
        <label>🏜 砂丘滞在</label>
        <div class="ctrl-row">
          <input type="range" id="duneTime" min="0.5" max="3" step="0.5" value="0.5" oninput="updateETA()" style="accent-color:var(--accent2)">
          <span class="ctrl-val" id="duneVal">0.5h</span>
        </div>
      </div>
      <div class="ctrl-group">
        <label>🛑 休憩・SA</label>
        <div class="ctrl-row">
          <input type="range" id="restTime" min="0" max="2" step="0.5" value="0.5" oninput="updateETA()" style="accent-color:var(--blue)">
          <span class="ctrl-val" id="restVal">0.5h</span>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-header">
      <span style="font-size:17px;">💬</span>
      <span class="chat-header-title">帰り道チャット</span>
      <span class="online-count">🟢 帰還モード</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <select class="name-select" id="myName">
        <option value="">名前▼</option>
        <option value="タロ">タロ 🛹</option>
        <option value="ケン">ケン 🔥</option>
        <option value="ユウ">ユウ ⚡</option>
        <option value="コウ">コウ 💀</option>
        <option value="リョウ">リョウ 🤙</option>
        <option value="ヒロ">ヒロ 🎯</option>
        <option value="マコ">マコ 🌊</option>
      </select>
      <textarea class="msg-input" id="msgInput" placeholder="メッセージ..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
// 最短ルート: 鳥取道→佐用JCT→中国道→吹田JCT→名神→名古屋
// エネトピア→砂丘: 約3km / 約10分
// 砂丘→名古屋（最短）: 約368km / 約4.5h（高速込み、渋滞なし）
// 砂丘→佐用JCT: 鳥取道62km 約1h
// 砂丘→吹田JCT: 約180km 約2.5h
const ENETOPIA_DUNE = 10/60;
const DUNE_NAGOYA = 4.5;
const DUNE_SAYO = 1.0;
const DUNE_SUITA = 2.5;

let depMin = 9 * 60;

function fmt(m) {
  const h = Math.floor(m / 60) % 24, mm = m % 60;
  return `${h.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
}
function changeDep(d) {
  depMin = Math.max(5*60, Math.min(15*60, depMin + d));
  document.getElementById('depDisplay').textContent = fmt(depMin);
  updateETA();
}
function updateETA() {
  const duneH = parseFloat(document.getElementById('duneTime').value);
  const restH = parseFloat(document.getElementById('restTime').value);
  document.getElementById('duneVal').textContent = duneH + 'h';
  document.getElementById('restVal').textContent = restH + 'h';
  document.getElementById('dune-dur').textContent = duneH;
  document.getElementById('t-dep').textContent = fmt(depMin);

  const duneArr = depMin + ENETOPIA_DUNE * 60;
  const duneDep = duneArr + duneH * 60;

  const sayoTime = duneDep + DUNE_SAYO * 60;
  const suitaTime = duneDep + DUNE_SUITA * 60;
  const arrTime = duneDep + DUNE_NAGOYA * 60 + restH * 60;

  document.getElementById('t-dune-arr').textContent = fmt(duneArr);
  document.getElementById('t-mid').textContent = fmt(sayoTime);
  document.getElementById('t-tsuruga').textContent = fmt(suitaTime);

  const el = document.getElementById('t-arrive');
  el.textContent = fmt(arrTime);
  const arrH = arrTime / 60;
  el.style.color = arrH > 22 ? '#ff4d1c' : arrH > 20 ? '#ffd700' : '#00e676';
}

const emojis = {タロ:'🛹',ケン:'🔥',ユウ:'⚡',コウ:'💀',リョウ:'🤙',ヒロ:'🎯',マコ:'🌊'};

function nowTime() { const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

function addMsg(name, text, isMe, time) {
  const c = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${isMe ? 'me' : ''}`;
  d.innerHTML = `<div class="avatar">${emojis[name]||'👤'}</div>
    <div class="msg-content">
      <div class="msg-name">${name}</div>
      <div class="bubble">${text}</div>
      <div class="msg-time">${time||nowTime()}</div>
    </div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function sendMsg() {
  const name = document.getElementById('myName').value;
  const text = document.getElementById('msgInput').value.trim();
  if (!name) { alert('名前を選んでください！'); return; }
  if (!text) return;
  addMsg(name, text, true);
  document.getElementById('msgInput').value = '';
}

// 初期メッセージ
[
  {n:'タロ', t:'エネトピアのスケボー場マジでよかった！また来たい🛹', time:'08:45'},
  {n:'リョウ', t:'砂丘、朝イチで行けば人少ないかもな〜', time:'08:51'},
  {n:'ケン', t:'中国道→名神が最短やな。渋滞さえなければ余裕', time:'08:58'},
  {n:'ユウ', t:'SA休憩どこがいい？宝塚あたりで一回止まろや', time:'09:03'},
  {n:'コウ', t:'砂丘でスケボーしたら怒られそう笑', time:'09:07'},
  {n:'マコ', t:'GWやから名神の渋滞ちょっと心配やな', time:'09:12'},
].forEach(m => addMsg(m.n, m.t, false, m.time));

updateETA();

setTimeout(() => addMsg('ヒロ', '鳥取道→中国道→名神が最短！渋滞なしで約4.5hで帰れる🔥', false), 2000);
setTimeout(() => addMsg('タロ', 'エネトピア、1Fにスケボー場あったの知らんかった！次は絶対滑る', false), 4000);
